<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Zanna "Z" mark: green top bar, steel diagonal, teal base -->
  <defs>
    <linearGradient id="ztop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8CC63F"/>
      <stop offset="100%" stop-color="#5FA832"/>
    </linearGradient>
    <linearGradient id="zmid" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B9C2C6"/>
      <stop offset="100%" stop-color="#4F7A72"/>
    </linearGradient>
    <linearGradient id="zbot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2BC8C4"/>
      <stop offset="100%" stop-color="#189AA8"/>
    </linearGradient>
  </defs>
  <polygon points="16,10 92,10 86,27 10,27" fill="url(#ztop)"/>
  <polygon points="70,27 86,27 32,73 16,73" fill="url(#zmid)"/>
  <polygon points="16,73 92,73 86,90 10,90" fill="url(#zbot)"/>
</svg>
