name: cppcheck

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  tools:
    name: src/tools static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            cppcheck \
            g++ \
            ninja-build

      - name: Configure compile database
        run: cmake -S . -B cppcheck-build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run cppcheck on src/tools
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --std=c++17 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --project=cppcheck-build/compile_commands.json \
            --file-filter='*/src/tools/*' \
            --template='{file}:{line}: {severity}: {id}: {message}'
