name: Linux Release Installers

on:
  workflow_dispatch:
    inputs:
      release:
        description: Require OpenPGP signing for Debian and RPM artifacts
        type: boolean
        default: false
      lifecycle:
        description: Exercise package-manager upgrades, bundle concurrency, and removal
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: linux-release-installer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      ZANNA_BUILD_DIR: build
      ZANNA_BUILD_TYPE: Release
      ZANNA_SKIP_INSTALL: "1"
      ZANNA_EXTRA_CMAKE_ARGS: -DZANNA_INSTALL_ZANNAIDE=ON

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install native package build and verification tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends rpm dpkg-sig gnupg

      - name: Record reproducible build epoch
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Build and test with the canonical Linux script
        shell: bash
        run: ./scripts/build_zanna_linux.sh

      - name: Stage the release payload
        shell: bash
        run: |
          rm -rf build/release-stage
          cmake --install build --prefix "$PWD/build/release-stage"

      - name: Import ephemeral OpenPGP release key
        if: ${{ inputs.release }}
        shell: bash
        env:
          LINUX_GPG_PRIVATE_KEY_BASE64: ${{ secrets.ZANNA_LINUX_GPG_PRIVATE_KEY_BASE64 }}
          LINUX_GPG_KEY_ID: ${{ secrets.ZANNA_LINUX_GPG_KEY_ID }}
        run: |
          set -euo pipefail
          if [[ -z "$LINUX_GPG_PRIVATE_KEY_BASE64" || -z "$LINUX_GPG_KEY_ID" ]]; then
            echo "release=true requires ZANNA_LINUX_GPG_PRIVATE_KEY_BASE64 and ZANNA_LINUX_GPG_KEY_ID" >&2
            exit 1
          fi
          key_file="$RUNNER_TEMP/zanna-linux-release-key.asc"
          printf '%s' "$LINUX_GPG_PRIVATE_KEY_BASE64" | base64 --decode > "$key_file"
          chmod 600 "$key_file"
          gpg --batch --import "$key_file"
          rm -f "$key_file"
          gpg --batch --list-secret-keys "$LINUX_GPG_KEY_ID" >/dev/null
          echo "ZANNA_LINUX_SIGN_KEY=$LINUX_GPG_KEY_ID" >> "$GITHUB_ENV"

      - name: Generate verified developer artifacts
        if: ${{ !inputs.release }}
        shell: bash
        run: |
          mkdir -p artifacts
          build/src/tools/zanna/zanna install-package \
            --stage-dir build/release-stage --target all \
            --output-dir artifacts --artifact-manifest artifacts/zanna-artifacts.json

      - name: Generate signed release artifacts
        if: ${{ inputs.release }}
        shell: bash
        run: |
          mkdir -p artifacts
          build/src/tools/zanna/zanna install-package \
            --stage-dir build/release-stage --target all \
            --output-dir artifacts --artifact-manifest artifacts/zanna-artifacts.json \
            --release

      - name: Reverify every artifact and checksum
        shell: bash
        run: |
          set -euo pipefail
          count=0
          while IFS= read -r -d '' artifact; do
            build/src/tools/zanna/zanna install-package --verify-only "$artifact" --require-checksum
            count=$((count + 1))
          done < <(find artifacts -maxdepth 1 -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.run' -o -name '*.tar.gz' \) -print0)
          [[ "$count" -eq 4 ]]
          (cd artifacts && sha256sum --check SHA256SUMS)
          if [[ '${{ inputs.release }}' == 'true' ]]; then
            deb="$(find artifacts -maxdepth 1 -type f -name '*.deb' -print -quit)"
            rpm="$(find artifacts -maxdepth 1 -type f -name '*.rpm' -print -quit)"
            dpkg-sig --verify "$deb" | tee "$RUNNER_TEMP/dpkg-signature.txt"
            grep -q GOODSIG "$RUNNER_TEMP/dpkg-signature.txt"
            rpmkeys --checksig --verbose "$rpm" | tee "$RUNNER_TEMP/rpm-signature.txt"
            grep -qi 'digests signatures OK' "$RUNNER_TEMP/rpm-signature.txt"
          fi

      - name: Exercise bundle cache and concurrent first launch
        if: ${{ inputs.lifecycle }}
        shell: bash
        run: ctest --test-dir build --output-on-failure -R '^linux_toolchain_bundle_smoke$'

      - name: Exercise Debian install, upgrade, functionality, and removal
        if: ${{ inputs.lifecycle }}
        shell: bash
        run: |
          sudo env ZANNA_RUN_LINUX_INSTALLER_SMOKE=1 \
            ctest --test-dir "$PWD/build" --output-on-failure -R '^linux_toolchain_deb_installer_smoke$'

      - name: Exercise RPM install, upgrade, functionality, and removal
        if: ${{ inputs.lifecycle }}
        shell: bash
        run: |
          sudo env ZANNA_RUN_LINUX_INSTALLER_SMOKE=1 \
            ctest --test-dir "$PWD/build" --output-on-failure -R '^linux_toolchain_rpm_installer_smoke$'

      - name: Upload verified artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zanna-toolchain-linux-x64
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
