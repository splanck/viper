name: macOS Release Installer

on:
  workflow_dispatch:
    inputs:
      release:
        description: Require Developer ID signing, notarization, stapling, and Gatekeeper
        type: boolean
        default: false
      lifecycle:
        description: Install, validate, and uninstall on the disposable runner
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: macos-release-installer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: macos-15
    timeout-minutes: 150
    env:
      VIPER_BUILD_DIR: build
      VIPER_BUILD_TYPE: Release
      VIPER_SKIP_INSTALL: "1"
      VIPER_EXTRA_CMAKE_ARGS: -DVIPER_INSTALL_VIPERIDE=ON

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Record reproducible build epoch
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Build and test with the canonical macOS script
        shell: bash
        run: ./scripts/build_viper_mac.sh

      - name: Stage the release payload
        shell: bash
        run: |
          rm -rf build/release-stage
          cmake --install build --prefix "$PWD/build/release-stage"

      - name: Build an upgrade baseline with a stale owned file
        if: ${{ inputs.lifecycle }}
        shell: bash
        run: |
          set -euo pipefail
          stale="build/release-stage/share/viper/installer-upgrade-stale.txt"
          mkdir -p "$(dirname "$stale")"
          printf '%s\n' 'owned only by upgrade baseline' > "$stale"
          build/src/tools/viper/viper install-package \
            --stage-dir build/release-stage --target macos \
            --output-file build/viper-upgrade-baseline.pkg
          rm -f "$stale"

      - name: Configure ephemeral Developer ID and notarization credentials
        if: ${{ inputs.release }}
        shell: bash
        env:
          MACOS_P12_BASE64: ${{ secrets.VIPER_MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_P12_PASSWORD: ${{ secrets.VIPER_MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_IDENTITY: ${{ secrets.VIPER_MACOS_INSTALLER_IDENTITY }}
          MACOS_APPLICATION_IDENTITY: ${{ secrets.VIPER_MACOS_APPLICATION_IDENTITY }}
          NOTARY_KEY_BASE64: ${{ secrets.VIPER_MACOS_NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.VIPER_MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.VIPER_MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          for name in MACOS_P12_BASE64 MACOS_P12_PASSWORD MACOS_INSTALLER_IDENTITY MACOS_APPLICATION_IDENTITY NOTARY_KEY_BASE64 NOTARY_KEY_ID NOTARY_ISSUER_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "release=true requires secret $name" >&2
              exit 1
            fi
          done
          keychain="$RUNNER_TEMP/viper-release.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          p12="$RUNNER_TEMP/viper-release.p12"
          notary_key="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$MACOS_P12_BASE64" | base64 -D > "$p12"
          printf '%s' "$NOTARY_KEY_BASE64" | base64 -D > "$notary_key"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$p12" -k "$keychain" -P "$MACOS_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db
          security default-keychain -d user -s "$keychain"
          xcrun notarytool store-credentials viper-ci \
            --key "$notary_key" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID"
          rm -f "$p12" "$notary_key"
          {
            echo "VIPER_MACOS_SIGN_IDENTITY=$MACOS_INSTALLER_IDENTITY"
            echo "VIPER_MACOS_APP_SIGN_IDENTITY=$MACOS_APPLICATION_IDENTITY"
            echo "VIPER_MACOS_NOTARY_PROFILE=viper-ci"
            echo "VIPER_RELEASE_KEYCHAIN=$keychain"
          } >> "$GITHUB_ENV"

      - name: Generate verified developer artifacts
        if: ${{ !inputs.release }}
        shell: bash
        run: |
          mkdir -p artifacts
          build/src/tools/viper/viper install-package \
            --stage-dir build/release-stage --target macos --macos-dmg \
            --output-dir artifacts --artifact-manifest artifacts/viper-artifacts.json

      - name: Generate signed, notarized, and stapled release artifacts
        if: ${{ inputs.release }}
        shell: bash
        run: |
          mkdir -p artifacts
          build/src/tools/viper/viper install-package \
            --stage-dir build/release-stage --target macos --macos-dmg \
            --output-dir artifacts --artifact-manifest artifacts/viper-artifacts.json \
            --macos-staple --release

      - name: Reverify package, disk image, checksums, and trust
        shell: bash
        run: |
          set -euo pipefail
          pkg="$(find artifacts -maxdepth 1 -type f -name '*.pkg' -print -quit)"
          dmg="$(find artifacts -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          [[ -n "$pkg" && -n "$dmg" ]]
          build/src/tools/viper/viper install-package --verify-only "$pkg" --require-checksum
          build/src/tools/viper/viper install-package --verify-only "$dmg" --require-checksum
          hdiutil verify "$dmg"
          if [[ '${{ inputs.release }}' == 'true' ]]; then
            pkgutil --check-signature "$pkg"
            spctl --assess --verbose=2 --type install "$pkg"
            xcrun stapler validate "$pkg"
            spctl --assess --verbose=2 --type open "$dmg"
            xcrun stapler validate "$dmg"
          fi

      - name: Exercise Installer.app choices, install, functionality, and uninstall
        if: ${{ inputs.lifecycle }}
        shell: bash
        run: |
          set -euo pipefail
          pkg="$(find artifacts -maxdepth 1 -type f -name '*.pkg' -print -quit)"
          trust=0
          [[ '${{ inputs.release }}' == 'true' ]] && trust=1
          sudo env \
            VIPER_RUN_MACOS_INSTALLER_SMOKE=1 \
            VIPER_REQUIRE_MACOS_PACKAGE_TRUST="$trust" \
            cmake \
              -DCMAKE_BIN="$(command -v cmake)" \
              -DVIPER_BIN="$PWD/build/src/tools/viper/viper" \
              -DVIPER_BUILD_DIR="$PWD/build" \
              -DVIPER_EXISTING_PACKAGE="$PWD/$pkg" \
              -DVIPER_BASELINE_PACKAGE="$PWD/build/viper-upgrade-baseline.pkg" \
              -P src/tests/tools/MacOSToolchainInstallerSmoke.cmake

      - name: Remove ephemeral signing keychain
        if: ${{ always() && inputs.release }}
        shell: bash
        run: |
          if [[ -n "${VIPER_RELEASE_KEYCHAIN:-}" ]]; then
            security default-keychain -d user -s login.keychain-db || true
            security delete-keychain "$VIPER_RELEASE_KEYCHAIN" || true
          fi

      - name: Upload verified artifacts
        uses: actions/upload-artifact@v4
        with:
          name: viper-toolchain-macos-arm64
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
