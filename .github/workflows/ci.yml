name: CI

on:
  push:
    branches: ['__disabled__']
  workflow_dispatch:

jobs:
  basic-strings:
    name: basic-strings suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build viper
        run: cmake --build build --target viper -j2
      - name: Run basic string tests
        run: ctest --test-dir build --output-on-failure -R basic_strings

  build:
    name: build (${{ matrix.os }}-${{ matrix.cc }}-threaded-${{ matrix.threaded }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: clang
            cxx: clang++
            exclude_label: ""
            threaded: OFF
          - os: ubuntu-latest
            cc: clang
            cxx: clang++
            exclude_label: ""
            threaded: ON
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
            exclude_label: ""
            threaded: OFF
          - os: macos-latest
            cc: clang
            cxx: clang++
            exclude_label: ""
            threaded: OFF
          - os: macos-latest
            cc: clang
            cxx: clang++
            exclude_label: ""
            threaded: ON
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v3
      - name: Print tool versions
        run: |
          ${{ matrix.cxx }} --version
          cmake --version
      - name: Install clang
        if: matrix.os == 'ubuntu-latest' && matrix.cc == 'clang'
        run: sudo apt-get install -y clang lld
      - name: Configure
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ] && [ "${{ matrix.cc }}" = "clang" ]; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DIL_WARN_AS_ERROR=ON -DIL_USE_LLD=ON -DVIPER_VM_THREADED=${{ matrix.threaded }}
          else
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DIL_WARN_AS_ERROR=ON -DVIPER_VM_THREADED=${{ matrix.threaded }}
          fi
      - name: Build
        run: cmake --build build -j2
      - name: Test
        run: |
          if [ -n "${{ matrix.exclude_label }}" ]; then
            echo "Excluding tests with label '${{ matrix.exclude_label }}'"
            ctest --test-dir build --output-on-failure -j2 -LE "${{ matrix.exclude_label }}"
          else
            ctest --test-dir build --output-on-failure -j2
          fi
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.os }}-${{ matrix.cc }}-threaded${{ matrix.threaded }}
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeCache.txt

  sanitize:
    name: sanitize (ubuntu-clang-asan-ubsan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install clang
        run: sudo apt-get install -y clang lld
      - name: Configure with ASAN + UBSAN
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          -DIL_USE_LLD=ON
        env:
          CC: clang
          CXX: clang++
      - name: Build
        run: cmake --build build -j2
        env:
          CC: clang
          CXX: clang++
      - name: Test
        run: ctest --test-dir build --output-on-failure -j2
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-sanitize
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeCache.txt

  windows-d3d11:
    name: windows-d3d11 focused validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Print tool versions
        run: cmake --version
      - name: Configure
        run: cmake -S . -B build -DIL_WARN_AS_ERROR=ON
      - name: Build focused targets
        run: cmake --build build --config Debug --target viper test_rt_canvas3d_gpu_paths test_vgfx3d_backend_utils
      - name: Run focused tests
        run: ctest --test-dir build -C Debug --output-on-failure -R "test_(rt_canvas3d_gpu_paths|vgfx3d_backend_utils)$"
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-windows-d3d11
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeCache.txt

  windows-release-installer:
    name: windows Release installer E2E
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: misc/editors/vscode/zia/package-lock.json
      - name: Print tool versions
        shell: pwsh
        run: |
          cmake --version
          node --version
          npm --version
      - name: Configure Release installer lane
        run: >
          cmake -S . -B build
          -DIL_WARN_AS_ERROR=ON
          -DVIPER_BUILD_VSCODE_VSIX=ON
          -DVIPER_ENABLE_WINDOWS_INSTALLER_E2E=ON
          -DCMAKE_BUILD_TYPE=Release
      - name: Build Release installer prerequisites
        run: >
          cmake --build build --config Release --target
          viper vbasic zia zia-server vbasic-server
          ilrun il-verify il-dis basic-ast-dump basic-lex-dump
          test_packaging vscode_zia_vsix
      - name: Run packaging unit tests
        run: ctest --test-dir build -C Release --output-on-failure -R "test_packaging"
      - name: Run Windows toolchain installer E2E
        run: ctest --test-dir build -C Release --output-on-failure -R "^installer_windows_toolchain_e2e$"
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-windows-release-installer
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeCache.txt
            build/tests/windows-toolchain-installer-e2e
