name: Windows Release Installer

on:
  workflow_dispatch:
    inputs:
      release:
        description: Require Authenticode signing and all release gates
        type: boolean
        default: false
      lifecycle:
        description: Install, upgrade, validate, and uninstall on the disposable runner
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: windows-release-installer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: windows-2025
    timeout-minutes: 120
    env:
      ZANNA_BUILD_DIR: build
      ZANNA_BUILD_TYPE: Release
      ZANNA_SKIP_INSTALL: "1"
      ZANNA_EXTRA_CMAKE_ARGS: -DZANNA_INSTALL_ZANNAIDE=ON

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Record reproducible build epoch
        shell: pwsh
        run: |
          "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build and test with the canonical Windows script
        shell: cmd
        run: scripts\build_zanna_win.cmd

      - name: Stage the release payload
        shell: pwsh
        run: |
          $stage = Join-Path $PWD "build\release-stage"
          Remove-Item -LiteralPath $stage -Recurse -Force -ErrorAction SilentlyContinue
          cmake --install build --prefix $stage --config Release
          if ($LASTEXITCODE -ne 0) { throw "cmake --install failed" }

      - name: Build an upgrade baseline with a stale owned file
        if: ${{ inputs.lifecycle }}
        shell: pwsh
        run: |
          $zanna = Join-Path $PWD "build\src\tools\zanna\Release\zanna.exe"
          if (-not (Test-Path -LiteralPath $zanna)) {
            $zanna = Join-Path $PWD "build\src\tools\zanna\zanna.exe"
          }
          $stage = Join-Path $PWD "build\release-stage"
          $stale = Join-Path $stage "share\zanna\installer-upgrade-stale.txt"
          New-Item -ItemType Directory -Path (Split-Path -Parent $stale) -Force | Out-Null
          Set-Content -LiteralPath $stale -Value "owned only by upgrade baseline" -Encoding ASCII
          & $zanna install-package --stage-dir $stage --target windows `
              --output-file "build\zanna-upgrade-baseline.exe"
          if ($LASTEXITCODE -ne 0) { throw "baseline package generation failed" }
          Remove-Item -LiteralPath $stale -Force

      - name: Import Authenticode certificate
        if: ${{ inputs.release }}
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.ZANNA_WINDOWS_SIGN_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.ZANNA_WINDOWS_SIGN_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_PFX_BASE64 -or -not $env:WINDOWS_PFX_PASSWORD) {
            throw "release=true requires ZANNA_WINDOWS_SIGN_PFX_BASE64 and ZANNA_WINDOWS_SIGN_PASSWORD"
          }
          $pfx = Join-Path $env:RUNNER_TEMP "zanna-release.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $password = ConvertTo-SecureString $env:WINDOWS_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password -Exportable:$false
          if (-not $cert) { throw "PFX import did not return a certificate" }
          "ZANNA_WINDOWS_SIGN_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Remove-Item -LiteralPath $pfx -Force

      - name: Generate verified developer artifact
        if: ${{ !inputs.release }}
        shell: pwsh
        run: |
          $zanna = Join-Path $PWD "build\src\tools\zanna\Release\zanna.exe"
          if (-not (Test-Path -LiteralPath $zanna)) { $zanna = Join-Path $PWD "build\src\tools\zanna\zanna.exe" }
          New-Item -ItemType Directory -Path artifacts | Out-Null
          & $zanna install-package --stage-dir "build\release-stage" --target windows `
              --output-file "artifacts\zanna-toolchain-windows-x64.exe" `
              --artifact-manifest "artifacts\zanna-artifacts.json"
          if ($LASTEXITCODE -ne 0) { throw "Windows package generation failed" }

      - name: Generate trusted release artifact
        if: ${{ inputs.release }}
        shell: pwsh
        env:
          ZANNA_WINDOWS_TIMESTAMP_URL: ${{ vars.ZANNA_WINDOWS_TIMESTAMP_URL }}
        run: |
          $zanna = Join-Path $PWD "build\src\tools\zanna\Release\zanna.exe"
          if (-not (Test-Path -LiteralPath $zanna)) { $zanna = Join-Path $PWD "build\src\tools\zanna\zanna.exe" }
          New-Item -ItemType Directory -Path artifacts | Out-Null
          & $zanna install-package --stage-dir "build\release-stage" --target windows `
              --output-file "artifacts\zanna-toolchain-windows-x64.exe" `
              --artifact-manifest "artifacts\zanna-artifacts.json" `
              --windows-sign --release
          if ($LASTEXITCODE -ne 0) { throw "trusted Windows package generation failed" }

      - name: Reverify artifact and checksum
        shell: pwsh
        run: |
          $zanna = Join-Path $PWD "build\src\tools\zanna\Release\zanna.exe"
          if (-not (Test-Path -LiteralPath $zanna)) { $zanna = Join-Path $PWD "build\src\tools\zanna\zanna.exe" }
          & $zanna install-package --verify-only "artifacts\zanna-toolchain-windows-x64.exe" --require-checksum
          if ($LASTEXITCODE -ne 0) { throw "post-generation verification failed" }
          if ('${{ inputs.release }}' -eq 'true') {
            $signature = Get-AuthenticodeSignature "artifacts\zanna-toolchain-windows-x64.exe"
            if ($signature.Status -ne 'Valid') { throw "Authenticode status is $($signature.Status)" }
          }

      - name: Exercise clean install, upgrade, functionality, and uninstall
        if: ${{ inputs.lifecycle }}
        shell: pwsh
        run: |
          $args = @(
            "-Installer", "artifacts\zanna-toolchain-windows-x64.exe",
            "-BaselineInstaller", "build\zanna-upgrade-baseline.exe"
          )
          if ('${{ inputs.release }}' -eq 'true') { $args += "-RequireSignature" }
          & "scripts\validate-windows-toolchain-installer.ps1" @args

      - name: Upload verified artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zanna-toolchain-windows-x64
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
