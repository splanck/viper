name: Windows Release Installer

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Installer architecture"
        required: true
        default: "x64"
        type: choice
        options:
          - x64
          - arm64
      sign:
        description: "Authenticode sign the installer when signing material is available"
        required: true
        default: false
        type: boolean

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-latest
    env:
      VIPER_BUILD_TYPE: Release
      VIPER_SKIP_INSTALL: "1"
      VIPER_EXTRA_CMAKE_ARGS: -DVIPER_INSTALL_VIPERIDE=ON
      VIPER_WINDOWS_TIMESTAMP_URL: ${{ vars.VIPER_WINDOWS_TIMESTAMP_URL }}
      VIPER_WINDOWS_SIGN_PASSWORD: ${{ secrets.VIPER_WINDOWS_SIGN_PASSWORD }}
      VIPER_WINDOWS_SIGN_THUMBPRINT: ${{ secrets.VIPER_WINDOWS_SIGN_THUMBPRINT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and test
        shell: cmd
        run: scripts\build_viper_win.cmd

      - name: Restore PFX signing certificate
        if: ${{ inputs.sign && secrets.VIPER_WINDOWS_SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'viper-release-signing.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String('${{ secrets.VIPER_WINDOWS_SIGN_PFX_BASE64 }}'))
          "VIPER_WINDOWS_SIGN_PFX=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VIPER_WINDOWS_SIGN_PASSWORD_ARGV_OK=1" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build installer
        shell: pwsh
        run: |
          $viper = Join-Path $PWD 'build\src\tools\viper\Release\viper.exe'
          if (-not (Test-Path -LiteralPath $viper)) {
            $viper = Join-Path $PWD 'build\src\tools\viper\viper.exe'
          }
          $outDir = Join-Path $PWD 'build\installers'
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $args = @(
            'install-package',
            '--build-dir', 'build',
            '--config', 'Release',
            '--skip-build',
            '--target', 'windows',
            '--arch', '${{ inputs.arch }}',
            '-o', $outDir
          )
          if ('${{ inputs.sign }}' -eq 'true') {
            $args += '--windows-sign'
          }
          & $viper @args

      - name: Verify installer
        shell: pwsh
        run: |
          $viper = Join-Path $PWD 'build\src\tools\viper\Release\viper.exe'
          if (-not (Test-Path -LiteralPath $viper)) {
            $viper = Join-Path $PWD 'build\src\tools\viper\viper.exe'
          }
          Get-ChildItem build\installers -Filter '*.exe' | ForEach-Object {
            & $viper install-package --verify-only $_.FullName
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: viper-windows-${{ inputs.arch }}-installer
          path: build/installers/*.exe
          if-no-files-found: error
