<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- V shape with snake head on left arm -->
  <defs>
    <linearGradient id="vg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B5E3A"/>
      <stop offset="100%" stop-color="#14452A"/>
    </linearGradient>
  </defs>

  <!-- Main V body -->
  <path d="
    M 56 42
    L 100 180
    L 144 42
    L 118 42
    L 100 140
    L 82 42
    Z
  " fill="url(#vg)"/>

  <!-- Left arm widens into snake neck/head -->
  <path d="
    M 30 8
    C 30 8, 28 20, 36 30
    L 56 42
    L 82 42
    L 58 28
    C 50 22, 48 12, 50 8
    Z
  " fill="url(#vg)"/>

  <!-- Snake head -->
  <path d="
    M 12 10
    C 6 4, 10 -2, 20 0
    L 50 8
    C 48 12, 50 22, 58 28
    L 36 30
    C 28 20, 30 8, 30 8
    L 20 6
    C 14 4, 12 10, 12 10
    Z
  " fill="url(#vg)"/>

  <!-- Eye -->
  <circle cx="26" cy="10" r="3.5" fill="#FFFFFF"/>
  <circle cx="26.5" cy="10" r="1.8" fill="#0A0A0A"/>

  <!-- Tongue -->
  <path d="M 10 11 L 2 8 M 10 11 L 3 15" stroke="#8B2020" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right arm top cap (matching thickness) -->
  <path d="
    M 118 42
    L 144 42
    L 158 28
    C 162 24, 160 18, 156 16
    L 140 16
    C 136 18, 132 24, 128 32
    Z
  " fill="url(#vg)"/>
</svg>
